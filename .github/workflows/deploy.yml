name: Deploy to Lightsail

# Deploy automático em produção (chamafacil.app) a cada push na main que toque
# o backend, a landing ou a configuração de deploy. Também roda manualmente.
#
# O servidor é um clone git (remote via deploy key SSH read-only). Este workflow
# só faz SSH e roda `git fetch/reset` + rebuild. O `.env` e o `vendor/` do servidor
# são preservados (gitignored — `git reset --hard` não os toca).
#
# Secrets necessários (Settings -> Secrets and variables -> Actions):
#   LIGHTSAIL_HOST     -> Static IP da instância (32.197.79.197)
#   LIGHTSAIL_USER     -> ec2-user
#   LIGHTSAIL_SSH_KEY  -> conteúdo da chave .pem de acesso à instância

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'landing/**'
      - 'docker-compose.prod.yml'
      - 'Caddyfile.prod'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            cd ~/services-marketplace

            # Atualiza o código a partir do GitHub (deploy key). Fast-forward duro
            # para a main; .env e vendor/ (gitignored) são preservados.
            export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=accept-new"
            git fetch origin main
            git reset --hard origin/main

            COMPOSE="docker compose -f docker-compose.prod.yml"
            $COMPOSE build
            $COMPOSE run --rm --no-deps backend \
              composer install --no-dev --optimize-autoloader --no-interaction
            $COMPOSE up -d
            # O Caddyfile é um bind mount de ARQUIVO ÚNICO. `git reset --hard`
            # troca o arquivo por rename atômico (novo inode), mas o container em
            # execução continua preso ao inode antigo — então um `caddy reload`
            # lê a config velha de dentro do container e "tem sucesso" sem aplicar
            # nada. Só recriar o container re-resolve o mount para o arquivo novo.
            # Certificados vivem no volume chamafacil-caddy-data (preservado); o
            # blip é subsegundo.
            $COMPOSE up -d --force-recreate caddy
            $COMPOSE exec -T backend php artisan migrate --force
            # Dados de referência idempotentes (categorias, perguntas, catálogos) em todo deploy.
            $COMPOSE exec -T backend php artisan db:seed --class=ProductionSeeder --force
            $COMPOSE exec -T backend php artisan config:cache
            docker image prune -f
