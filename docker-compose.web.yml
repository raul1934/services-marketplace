# Run both Expo apps as WEB builds (react-native-web) in Docker.
#
#   docker compose -f docker-compose.web.yml up
#
# Then open (via Caddy):  customer → http://customer.chamafacil.local   provider → http://provider.chamafacil.local
# (direct Metro ports 19083/19082 also stay published as a fallback.)
#
# A one-shot `installer` service runs `npm install` once into the shared
# ./frontend/node_modules; both web servers wait for it before starting (two
# concurrent installs into the same workspace would corrupt node_modules).
#
# Note: react-native-maps has no web support, so the tracking / nearby-map
# screens render a placeholder (see src/web-stubs/react-native-maps.tsx).

services:
  installer:
    image: node:22-bookworm
    container_name: chamafacil-web-installer
    working_dir: /app
    command: sh -lc "npm install"
    volumes:
      - ./frontend:/app

  customer-web:
    image: node:22-bookworm
    container_name: chamafacil-customer-web
    working_dir: /app/apps/customer
    command: sh -lc "npx --no-install expo start --web --port 19083"
    environment:
      EXPO_NO_TELEMETRY: "1"
      # Routed through Caddy via hostnames on :80 (HTTP only — auto_https off).
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_CUSTOMER_API_URL:-http://api.chamafacil.local:19000/api/customer/v1}
      EXPO_PUBLIC_API_HOST: ${EXPO_PUBLIC_API_HOST:-http://api.chamafacil.local:19000}
      EXPO_PUBLIC_REVERB_HOST: ${EXPO_PUBLIC_REVERB_HOST:-localhost}
      EXPO_PUBLIC_REVERB_PORT: ${EXPO_PUBLIC_REVERB_PORT:-19080}
      # Must match backend .env REVERB_APP_KEY for the WebSocket to authenticate.
      EXPO_PUBLIC_REVERB_KEY: ${EXPO_PUBLIC_REVERB_KEY:-1kwtg5xpykisjdjv5wlq}
      # OSRM routing server for the en-route road route. Public demo by default;
      # set to a self-hosted instance for production (see docker-compose.osrm.yml).
      EXPO_PUBLIC_OSRM_URL: ${EXPO_PUBLIC_OSRM_URL:-https://router.project-osrm.org}
    volumes:
      - ./frontend:/app
    ports:
      - "19083:19083"
    depends_on:
      installer:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    restart: unless-stopped

  provider-web:
    image: node:22-bookworm
    container_name: chamafacil-provider-web
    working_dir: /app/apps/provider
    command: sh -lc "npx --no-install expo start --web --port 19082"
    environment:
      EXPO_NO_TELEMETRY: "1"
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_PROVIDER_API_URL:-http://api.chamafacil.local:19000/api/provider/v1}
      EXPO_PUBLIC_API_HOST: ${EXPO_PUBLIC_API_HOST:-http://api.chamafacil.local:19000}
      EXPO_PUBLIC_REVERB_HOST: ${EXPO_PUBLIC_REVERB_HOST:-localhost}
      EXPO_PUBLIC_REVERB_PORT: ${EXPO_PUBLIC_REVERB_PORT:-19080}
      # Must match backend .env REVERB_APP_KEY for the WebSocket to authenticate.
      EXPO_PUBLIC_REVERB_KEY: ${EXPO_PUBLIC_REVERB_KEY:-1kwtg5xpykisjdjv5wlq}
      # OSRM routing server for the en-route road route. Public demo by default;
      # set to a self-hosted instance for production (see docker-compose.osrm.yml).
      EXPO_PUBLIC_OSRM_URL: ${EXPO_PUBLIC_OSRM_URL:-https://router.project-osrm.org}
    volumes:
      - ./frontend:/app
    ports:
      - "19082:19082"
    depends_on:
      installer:
        condition: service_completed_successfully
    stdin_open: true
    tty: true
    restart: unless-stopped
