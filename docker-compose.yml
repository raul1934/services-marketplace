# Guincho (Chama Fácil) local stack. Designed to run side-by-side with the lula
# stack: distinct project name, isolated network/subnet, all host ports in the
# 19xxx range, and the reverse proxy off :80 (lula's Caddy owns :80/:443).
# See DOCKER.md for the full coexistence notes.
name: guincho

services:
  db:
    image: postgres:16-alpine
    container_name: guincho-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: guincho
      POSTGRES_USER: guincho
      POSTGRES_PASSWORD: secret
    ports:
      - "19432:5432"
    volumes:
      - guincho-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guincho -d guincho"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: guincho-backend
    working_dir: /app
    command: sh -c "php artisan migrate --force && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    ports:
      - "19000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build: ./backend
    container_name: guincho-queue
    working_dir: /app
    command: php artisan queue:work --tries=3 --timeout=60
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  reverb:
    build: ./backend
    container_name: guincho-reverb
    working_dir: /app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    ports:
      - "19080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build: ./backend
    container_name: guincho-scheduler
    working_dir: /app
    # Runs the Laravel scheduler loop (routes/console.php) — e.g. the hourly
    # orphan-media sweep and the per-minute stale-request expiry.
    command: php artisan schedule:work
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # NOTE: the mobile apps are now React Native (Expo) and run on the host with
  # Metro (`npm run customer` / `npm run provider` in ./frontend), connecting to
  # this API over the LAN — they are no longer served as web containers here.
  # See frontend/README.md.

  caddy:
    image: caddy:2-alpine
    container_name: guincho-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - reverb
    # Reverse proxy for *.chamafacil.local. Kept OFF host :80 so it never fights the
    # lula Caddy (lula-core-be-caddy / lula-caddy-rev-proxy bind :80 + :443).
    # Reachable at http://<host>.chamafacil.local:19088.
    # The mobile apps don't need this — they hit localhost:19000 / :19080 directly.
    ports:
      - "19088:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - guincho-caddy-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Marketing landing page on a dedicated host port, so it never competes with
  # whatever else may own :80. Open http://localhost:19090
  landing:
    image: caddy:2-alpine
    container_name: guincho-landing
    restart: unless-stopped
    command: caddy file-server --root /srv --listen :80
    ports:
      - "19090:80"
    volumes:
      - ./landing:/srv:ro

volumes:
  guincho-db-data:
  guincho-caddy-data:

# Pin the project's default network to a dedicated name + subnet that does not
# overlap lula's networks (lula-core 172.18.4.0/24, core-be-network 172.18.3.0/24).
# All services join this automatically, so both stacks can run at once.
networks:
  default:
    name: guincho
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
