; PHP tuning for the containerised dev/prod stack.
;
; The API is served by `php artisan serve`, which is a CLI process — and PHP
; disables OPcache for CLI by default. Without enable_cli the bytecode cache is
; loaded but inert, so every request recompiles every PHP file it touches. On
; Docker Desktop for Windows, where ./backend is a bind mount, that meant ~4s
; per request (even /up, which touches no database).
opcache.enable=1
opcache.enable_cli=1

; The app plus vendor is ~17k files; the 10k default would thrash.
opcache.max_accelerated_files=30000
opcache.memory_consumption=256
opcache.interned_strings_buffer=16

; Keep timestamp validation ON so edited PHP still takes effect without a
; restart — but check at most once every couple of seconds per file instead of
; on every single request. Over a slow bind mount that stat storm is most of
; the remaining cost.
opcache.validate_timestamps=1
opcache.revalidate_freq=2
