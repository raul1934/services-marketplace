<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>walvee · Protótipo navegável</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Sora:wght@500;600;700;800&family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="walvee-ui.css" />
<link rel="stylesheet" href="walvee-v2.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #0e1116; font-family: "Manrope", system-ui, sans-serif; }
  #root { height: 100vh; }

  .proto-root { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* top chrome */
  .proto-bar {
    height: 58px; flex: none; display: flex; align-items: center; gap: 8px;
    padding: 0 14px; background: #161b22; border-bottom: 1px solid #232a33; color: #e7ebf0;
  }
  .pb-btn {
    height: 36px; min-width: 36px; padding: 0 9px; border-radius: 10px; border: 1px solid #2b333d;
    background: #1d242d; color: #cdd4dd; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .pb-btn.wide { padding: 0 12px; }
  .pb-btn:hover:not(:disabled) { background: #252e39; color: #fff; }
  .pb-btn:disabled { opacity: .38; cursor: default; }
  .pb-title { font-size: 14px; font-weight: 800; letter-spacing: -.01em; margin-left: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .grow { flex: 1; }
  .pb-toggle {
    height: 36px; padding: 0 12px; border-radius: 10px; border: 1px solid #2b333d; background: #1d242d;
    color: #cdd4dd; display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .pb-toggle:hover { background: #252e39; color: #fff; }

  /* stage */
  .proto-stage {
    flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden;
    background:
      radial-gradient(1100px 600px at 50% -10%, #1a212b 0%, #0e1116 60%);
  }
  .proto-screen { transform-origin: center center; }
  .proto-screen .phone { box-shadow: 0 40px 90px -30px rgba(0,0,0,.7); }
  /* make the inner scroll region actually scroll inside the fixed phone */
  .proto-screen .phone .scroll { overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .proto-screen .phone .scroll::-webkit-scrollbar { width: 0; height: 0; }
  .proto-screen .phone .scroll { scrollbar-width: none; }
  [data-go] { cursor: pointer; }

  /* Rotas entry card on dashboard */
  .proto-rotas { display: flex; align-items: center; gap: 13px; padding: 15px 16px; border-radius: 18px;
    background: var(--grad); color: #fff; cursor: pointer; box-shadow: 0 16px 32px -18px rgba(193,100,31,.7);
  }
  .proto-rotas .pr-ic { width: 46px; height: 46px; border-radius: 14px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; flex: none; }
  .proto-wait { width: 64px; height: 64px; border-radius: 22px; background: var(--accent-soft); color: var(--accent); display: flex; align-items: center; justify-content: center; }
  .proto-wait.ok { background: var(--ok-soft); color: var(--ok); }

  /* agenda filter */
  .ag-filter { flex: none; display: flex; gap: 8px; padding: 4px 20px 12px; overflow-x: auto; scrollbar-width: none; }
  .ag-filter::-webkit-scrollbar { display: none; }
  .ag-chip { flex: none; padding: 8px 14px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); font-size: 12.5px; font-weight: 700; cursor: pointer; font-family: inherit; white-space: nowrap; }
  .ag-chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .ag-chip.date { display: inline-flex; align-items: center; gap: 5px; }
  .ag-active { display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; color: var(--ink-2); padding: 2px 2px 4px; }
  .ag-active b { color: var(--ink); }
  .ag-clear { display: inline-flex; align-items: center; gap: 4px; border: none; background: none; color: var(--accent); font-size: 12px; font-weight: 800; cursor: pointer; font-family: inherit; }
  .badge.b-ok { background: var(--ok-soft); color: var(--ok); }
  .badge.b-cancel { background: rgba(120,130,140,.16); color: var(--ink-3); }

  /* screen menu */
  .proto-menu { position: fixed; inset: 0; background: rgba(8,11,15,.62); display: flex; justify-content: flex-end; z-index: 50; }
  .pm-panel { width: 320px; max-width: 86vw; height: 100%; background: #141a21; border-left: 1px solid #232a33; overflow-y: auto; padding: 14px 14px 30px; color: #e7ebf0; }
  .pm-head { display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: 15px; padding: 4px 2px 12px; }
  .pm-group { margin-top: 10px; }
  .pm-glabel { font-size: 11px; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; color: #7c879a; margin: 6px 4px 7px; }
  .pm-item {
    display: block; width: 100%; text-align: left; padding: 10px 12px; border-radius: 10px; border: 1px solid transparent;
    background: #1b222b; color: #cdd4dd; font-size: 13px; font-weight: 700; cursor: pointer; margin-bottom: 6px; font-family: inherit;
  }
  .pm-item:hover { background: #232c37; color: #fff; }
  .pm-item.on { background: var(--accent, #c3641f); color: #fff; border-color: transparent; }
</style>

</head>
