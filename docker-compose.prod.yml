# Chama Fácil / chamafacil.app — stack de PRODUÇÃO (instância única Lightsail).
#
# Arquivo AUTÔNOMO (não é override do docker-compose.yml de dev). Use sozinho:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Diferenças em relação ao dev (docker-compose.yml):
#   - Nenhum serviço publica porta no host, exceto o Caddy (80/443). O acesso
#     externo passa só pelo reverse proxy; db/backend/reverb ficam na rede interna.
#   - Caddy usa Caddyfile.prod (HTTPS automático via Let's Encrypt).
#   - Sem o container `landing` separado — o Caddy de produção já serve ./landing.
#   - Segredos (senha do banco) vêm do arquivo .env na raiz (NÃO versionado);
#     veja .env.production.example. As demais vars do Laravel (APP_KEY, APP_URL,
#     REVERB_*, ...) vêm de backend/.env no servidor.
#
# Variáveis de ambiente reais definidas aqui têm precedência sobre backend/.env
# no Laravel, então a senha do banco fica num único lugar (o .env da raiz).
name: chamafacil

x-php-env: &php-env
  DB_CONNECTION: pgsql
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}

# Banco: usa o Lightsail Managed Database (PostgreSQL) via DB_HOST no .env da raiz.
# Não há container de banco aqui — o dado vive no serviço gerenciado, com backups
# próprios do Lightsail. Veja .env.production.example.
services:
  backend:
    build: ./backend
    container_name: chamafacil-backend
    working_dir: /app
    command: sh -c "php artisan migrate --force && php artisan storage:link 2>/dev/null; php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      <<: *php-env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  queue:
    build: ./backend
    container_name: chamafacil-queue
    working_dir: /app
    # --max-time recicla o worker a cada 5 min (sai limpo depois do job em
    # andamento; `restart: unless-stopped` sobe de novo). Sem isso ele carrega a
    # aplicação UMA vez, na subida, e como o código é bind mount o `up -d` do
    # deploy não o recria: ele segue rodando o código e a config de antes do
    # deploy, em silêncio — o job entra na fila, o worker antigo não conhece a
    # classe nova, e o trabalho some sem erro em lugar nenhum. Aconteceu: um
    # worker de 40h continuou mandando e-mail para `log` depois do SMTP
    # configurado. O scheduler não precisa disso: `schedule:work` dispara
    # `schedule:run` num processo novo a cada minuto.
    command: php artisan queue:work --tries=3 --timeout=60 --max-time=300
    # Precisa ser MAIOR que o --timeout acima. No `up -d` e no `restart` o Docker
    # manda SIGTERM e mata em seguida; o Laravel entende o sinal e termina o job
    # em andamento, mas com o padrão de 10s um job mais longo morre no meio.
    # Ele não se perde — volta depois do retry_after (90s) — porém roda de novo
    # desde o começo, e aí um e-mail que já saiu vira dois.
    stop_grace_period: 90s
    environment:
      <<: *php-env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  reverb:
    build: ./backend
    container_name: chamafacil-reverb
    working_dir: /app
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    environment:
      <<: *php-env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  scheduler:
    build: ./backend
    container_name: chamafacil-scheduler
    working_dir: /app
    command: php artisan schedule:work
    environment:
      <<: *php-env
    volumes:
      - ./backend:/app
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: chamafacil-caddy
    restart: unless-stopped
    depends_on:
      - backend
      - reverb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - ./landing:/srv/landing:ro
      - chamafacil-caddy-data:/data
      - chamafacil-caddy-config:/config

volumes:
  chamafacil-caddy-data:
  chamafacil-caddy-config:

networks:
  default:
    name: chamafacil
